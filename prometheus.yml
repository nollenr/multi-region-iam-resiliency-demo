global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'iam-demo-monitor'

scrape_configs:
  # Scrape metrics from IAM demo apps in each region
  - job_name: 'iam-demo'
    scrape_interval: 2s
    scrape_timeout: 2s
    static_configs:
      # Region 1: aws-us-east-1
      - targets: ['<REGION1_APP_HOST>:8000']
        labels:
          region: 'aws-us-east-1'
          app: 'iam-demo'

      # Region 2: aws-us-east-2
      - targets: ['<REGION2_APP_HOST>:8000']
        labels:
          region: 'aws-us-east-2'
          app: 'iam-demo'

      # Region 3: aws-us-west-2
      - targets: ['<REGION3_APP_HOST>:8000']
        labels:
          region: 'aws-us-west-2'
          app: 'iam-demo'

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
